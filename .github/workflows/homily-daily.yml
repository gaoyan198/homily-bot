name: homily-daily

on:
  schedule:
    - cron: '0 1 * * 1-5'      # 01:00 UTC = 09:00 SGT, Mon–Fri
    - cron: '0 2 * * 0'        # #33: Sunday 10:00 SGT — weekly deep dive
                               # (daily_run detects Sunday; fetch-free path)
  workflow_dispatch: {}         # manual "Run workflow" button

permissions:
  contents: write               # allow committing champion/log state back

concurrency:
  group: homily-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Gate order (EXECUTION.md R5): validate -> digest -> commit, each step
      # only reached if the previous passed. Self-test runs FIRST so a red
      # test (incl. the #49 golden-digest check) fails the job before
      # daily_run.py sends the Telegram digest or daily_refine() mutates
      # champion/log state — no broken digest goes out, no half-committed
      # state. The self-test is fully offline/synthetic, so it needs nothing
      # from the digest step.
      - name: Self-test — gates the send (keeps the algo honest)
        run: python homily_validate.py

      - name: Run daily Homily digest + auto-refine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # #31 buy-day copilot: repo VARIABLES (not secrets — plain numbers/
          # flags, PRD §8 #31). Unset BUY_BUDGET_USD = copilot stays dark and
          # the digest is unchanged.
          BUY_BUDGET_USD: ${{ vars.BUY_BUDGET_USD }}
          SRS_COVERS_INDEX: ${{ vars.SRS_COVERS_INDEX }}
          # #30 bear-readiness: owner confirms margin is zero (§6) by setting
          # this variable; unset = the monthly rehearsal block nags.
          MARGIN_ZERO: ${{ vars.MARGIN_ZERO }}
          # #32 Flex auto-sync (SECRETS — a token, unlike the vars above).
          # Unset = no sync, holdings.json stays the manual fallback.
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY: ${{ secrets.IBKR_FLEX_QUERY }}
        run: python daily_run.py

      - name: Commit refined champion + log
        run: |
          git config user.name "homily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add homily_champion.json homily_refine_log.csv homily_fund_cache.json 2>/dev/null || true
          # #66 quarterly quality-tier cache (R8) — same pattern as the
          # fund cache above
          git add homily_quality_cache.json 2>/dev/null || true
          # #21 parallel-objective log (R8): the 30-day J record accrues
          # here; losing rows restarts the parallel-run clock
          git add homily_refine_j.csv 2>/dev/null || true
          # #13 signals ledger + snapshot + append-only checkpoint (R8): commit
          # them here or CI silently discards the track record every day.
          git add homily_signals_log.csv homily_ledger_hash.json docs/snapshot.json 2>/dev/null || true
          # #31/T2 basket CSV (R8): commit the buy-day orders file the day
          # it's written, or the month's basket is silently discarded
          git add docs/orders_*.csv 2>/dev/null || true
          # #36 dashboard (R8): the nightly render is a committed artifact
          git add docs/dashboard.html 2>/dev/null || true
          # #32 (R8): a Flex-synced book must be committed the day it syncs
          git add holdings.json 2>/dev/null || true
          git commit -m "daily refine $(date -u +%F)" || echo "no state change"
          git push || echo "nothing to push"
